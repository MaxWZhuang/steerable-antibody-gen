# Stage 2/4 — paired VH/VL refinement. Warm-starts from the stage-1 base model.
# Produces checkpoints/mlm_paired_refine_v3/best.pt, consumed by stage 3's init_checkpoint.
# This is BY FAR the largest compute item in the chain (45 epochs over ~1.8M paired rows);
# best.pt is checkpointed on val loss, but all 45 epochs run (no early stopping).
training_stage: paired_refine
data_path: data/processed/oas_paired_all/oas_paired.jsonl.gz
init_checkpoint: checkpoints/mlm_3m_unpaired_v3/best.pt
output_dir: checkpoints/mlm_paired_refine_v3
resume_from_last: true

seed: 42
batch_size: 32
eval_batch_size: 32
train_num_workers: 0
eval_num_workers: 0
max_length: 192
bucket_width: 8

mask_probability: 0.15
hcdr3_span_probability: 0.1
hcdr3_span_min: 3
hcdr3_span_max: 8
shuffle_pair_probability: 0.5
pair_loss_weight: 0.5

learning_rate: 0.0001
warmup_steps: 500         # NEW vs prior run.
weight_decay: 0.01
grad_clip_norm: 1.0
epochs: 8             # was 45. Warm-start refine at lr 1e-4; best.pt (val-selected) plateaus
                     # well before 8 epochs, so 45 was ~5x wasted compute with no early stop.

d_model: 256
n_heads: 8
n_layers: 6
d_ff: 1024                # FIX: old example said 512, which fails the init-compat check against the 1024 base.
dropout: 0.1

use_amp: false            # matches the known-good prior paired run. Flip to true for speed if stable.
show_progress: true
device: cuda
