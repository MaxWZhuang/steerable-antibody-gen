seed: 42
batch_size: 32
num_workers: 2
max_length: 168
mask_probability: 0.15
learning_rate: 0.0003
weight_decay: 0.01
epochs: 5
warmup_steps: 500
grad_clip_norm: 1.0
mixed_precision: true

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  dropout: 0.1

optimizer:
  betas: [0.9, 0.999]
  eps: 1.0e-8

logging:
  log_every: 50
  eval_every: 500
  save_every: 1000