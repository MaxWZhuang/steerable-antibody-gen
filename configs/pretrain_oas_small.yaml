# Example config for a ~1M-sequence unpaired MLM pretraining run.
# Replace data_path with your processed JSONL(.gz) file before launching.

data_path: /absolute/path/to/your_unpaired_oas_1m.jsonl.gz
output_dir: checkpoints/mlm_oas_1m_unpaired

seed: 42
batch_size: 64
eval_batch_size: 64
num_workers: 4
max_length: 192
bucket_width: 8

mask_probability: 0.15
hcdr3_span_probability: 0.2
hcdr3_span_min: 3
hcdr3_span_max: 8
shuffle_pair_probability: 0.0
pair_loss_weight: 0.0

learning_rate: 0.0003
weight_decay: 0.01
epochs: 5
grad_clip_norm: 1.0
mixed_precision: true

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  dropout: 0.1

optimizer:
  betas: [0.9, 0.999]
  eps: 1.0e-8

logging:
  log_every: 100
  eval_every: 2000
  save_every: 2000
